<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DriftIQ — Shared File</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#08080f;color:#eeeeff;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.box{background:#0f0f1a;border:1px solid #2a2a42;border-radius:28px;padding:48px 40px;text-align:center;max-width:420px;width:100%;}
.logo{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,#7c6bff,#ff6b9d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:32px;}
.icon{font-size:3.5rem;margin-bottom:16px;}
.filename{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:6px;word-break:break-all;}
.sub{color:#6b6b8f;font-size:0.85rem;margin-bottom:28px;}
.dl-btn{background:linear-gradient(135deg,#7c6bff,#9b8fff);border:none;color:white;padding:14px 32px;border-radius:13px;font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 24px rgba(124,107,255,0.35);display:none;}
.dl-btn:hover{transform:translateY(-2px);}
.dl-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.error{color:#ff6b9d;margin-top:16px;font-size:0.85rem;}
</style>
</head>
<body>
<div class="box">
  <div class="logo">DriftIQ</div>
  <div class="icon" id="icon">📁</div>
  <div class="filename" id="filename">Loading...</div>
  <div class="sub">Shared file — click button to download</div>
  <!-- Fix 1: Use button instead of anchor tag -->
  <button class="dl-btn" id="dlBtn" onclick="downloadFile()">⬇️ Download File</button>
  <div class="error" id="err" style="display:none">❌ File not found or link expired</div>
</div>
<script>
const shareId = new URLSearchParams(window.location.search).get('id');
let fileData = null;

if (!shareId) {
  document.getElementById('err').style.display = 'block';
  document.getElementById('filename').textContent = 'Invalid link';
} else {
  fetch(`/api/shared/${shareId}`)
    .then(r => r.json())
    .then(d => {
      if (d.error) {
        document.getElementById('err').style.display = 'block';
        document.getElementById('filename').textContent = 'File not found';
        return;
      }
      fileData = d;
      document.getElementById('filename').textContent = d.fileName;
      // Fix 2: Show button with correct action text
      const btn = document.getElementById('dlBtn');
      btn.style.display = 'inline-block';
      btn.textContent = '⬇️ Download ' + d.fileName;
      const ext = d.fileName.split('.').pop().toLowerCase();
      const icon = ['jpg','jpeg','png','gif','webp'].includes(ext) ? '🖼️' :
                   ['mp4','mov','avi','mkv'].includes(ext) ? '🎬' :
                   ['mp3','wav','aac'].includes(ext) ? '🎵' :
                   ext === 'pdf' ? '📄' :
                   ['zip','rar','7z'].includes(ext) ? '🗜️' : '📁';
      document.getElementById('icon').textContent = icon;
    })
    .catch(() => {
      document.getElementById('err').style.display = 'block';
      document.getElementById('filename').textContent = 'Failed to load';
    });
}

// Fix 3: Route download through backend proxy to avoid CORS
async function downloadFile() {
  if (!fileData) return;
  const btn = document.getElementById('dlBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Downloading...';
  try {
    // Use backend proxy endpoint instead of direct Telegram URL
    const resp = await fetch(`/api/shared/${shareId}/download`);
    if (!resp.ok) throw new Error('Download failed');
    const blob = await resp.blob();
    const blobUrl = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = blobUrl;
    a.download = fileData.fileName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(blobUrl), 5000);
    btn.textContent = '✅ Downloaded!';
    setTimeout(() => {
      btn.textContent = '⬇️ Download ' + fileData.fileName;
      btn.disabled = false;
    }, 2000);
  } catch(e) {
    btn.textContent = '❌ Failed — Try Again';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
