<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DriftIQ — Personal Cloud</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#050508;--s1:#0c0c12;--s2:#12121c;--border:#1e1e2e;--accent:#6157ff;--a2:#ff4d8d;--a3:#00e5ff;--text:#f0f0ff;--muted:#5a5a7a;--green:#39ff85;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;overflow-x:hidden;}

/* SPLIT */
.split{display:grid;grid-template-columns:1fr 1fr;min-height:100vh;}

/* LEFT */
.left{position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:56px 52px;}
#bgCanvas{position:absolute;inset:0;z-index:0;}
.left::after{content:'';position:absolute;inset:0;opacity:0.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none;z-index:1;}
.lc{position:relative;z-index:2;}

.brand{display:flex;align-items:center;gap:11px;margin-bottom:56px;animation:sR 0.8s cubic-bezier(.16,1,.3,1) both;}
.b-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--accent),var(--a2));border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;box-shadow:0 0 20px rgba(97,87,255,.4);}
.b-name{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:4px;background:linear-gradient(135deg,#fff,#9090cc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

.headline{animation:sR 0.8s .1s cubic-bezier(.16,1,.3,1) both;}
.headline h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.8rem,4.5vw,5.2rem);line-height:.94;letter-spacing:2px;margin-bottom:18px;}
.l1{color:var(--text);}
.l2{background:linear-gradient(135deg,var(--accent),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:block;}
.l3{color:var(--a3);}

.tagline{font-size:.92rem;color:var(--muted);line-height:1.75;max-width:340px;margin-bottom:40px;font-weight:300;animation:sR 0.8s .2s cubic-bezier(.16,1,.3,1) both;}

.features{display:flex;flex-direction:column;gap:13px;margin-bottom:40px;}
.feat{display:flex;align-items:center;gap:13px;animation:sR 0.8s cubic-bezier(.16,1,.3,1) both;}
.feat:nth-child(1){animation-delay:.3s}.feat:nth-child(2){animation-delay:.4s}.feat:nth-child(3){animation-delay:.5s}.feat:nth-child(4){animation-delay:.6s}
.fdot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);flex-shrink:0;animation:pulse 2s infinite;}
.feat:nth-child(2) .fdot{background:var(--a2);box-shadow:0 0 8px var(--a2);animation-delay:.5s}
.feat:nth-child(3) .fdot{background:var(--a3);box-shadow:0 0 8px var(--a3);animation-delay:1s}
.feat:nth-child(4) .fdot{background:var(--green);box-shadow:0 0 8px var(--green);animation-delay:1.5s}
.ft{font-size:.86rem;color:#8888aa;font-weight:400;}
.ft strong{color:var(--text);font-weight:600;}

.srow{display:flex;gap:28px;animation:sR 0.8s .7s cubic-bezier(.16,1,.3,1) both;}
.sn{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:1px;background:linear-gradient(135deg,var(--a3),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sl{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-family:'JetBrains Mono',monospace;}

.fcards{position:absolute;right:-14px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:9px;z-index:2;}
.fc{background:rgba(12,12,18,.88);border:1px solid var(--border);border-radius:11px;padding:9px 13px;display:flex;align-items:center;gap:9px;backdrop-filter:blur(12px);min-width:150px;animation:floatC 3s ease-in-out infinite;}
.fc:nth-child(1){animation-delay:0s}.fc:nth-child(2){animation-delay:.5s}.fc:nth-child(3){animation-delay:1s}.fc:nth-child(4){animation-delay:1.5s}
.fci{font-size:1.1rem;}
.fcn{font-size:.69rem;font-weight:600;color:var(--text);}
.fcs{font-size:.59rem;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.fcd{width:5px;height:5px;border-radius:50%;background:var(--green);margin-left:auto;box-shadow:0 0 5px var(--green);}

/* RIGHT */
.right{background:var(--s1);display:flex;align-items:center;justify-content:center;padding:40px 44px;border-left:1px solid var(--border);position:relative;overflow:hidden;}
.right::before{content:'';position:absolute;top:-80px;right:-80px;width:260px;height:260px;background:radial-gradient(circle,rgba(97,87,255,.07),transparent 70%);border-radius:50%;animation:drift 6s ease-in-out infinite;}
.right::after{content:'';position:absolute;bottom:-80px;left:-60px;width:220px;height:220px;background:radial-gradient(circle,rgba(255,77,141,.05),transparent 70%);border-radius:50%;animation:drift 8s ease-in-out infinite reverse;}

.ac{width:100%;max-width:370px;position:relative;z-index:1;}

.atabs{display:flex;background:var(--s2);border:1px solid var(--border);border-radius:13px;padding:4px;margin-bottom:28px;animation:fU .6s .3s both;}
.atab{flex:1;padding:9px;text-align:center;font-size:.82rem;font-weight:600;color:var(--muted);cursor:pointer;border-radius:9px;transition:all .3s;border:none;background:none;font-family:'Space Grotesk',sans-serif;}
.atab.active{background:linear-gradient(135deg,var(--accent),#8b84ff);color:white;box-shadow:0 3px 14px rgba(97,87,255,.3);}

.aform{display:none;}
.aform.active{display:block;}

.ftitle{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;margin-bottom:5px;animation:fU .6s .4s both;}
.fsub{color:var(--muted);font-size:.82rem;margin-bottom:24px;font-weight:300;animation:fU .6s .5s both;}

.field{margin-bottom:13px;animation:fU .6s both;}
.field:nth-child(1){animation-delay:.5s}.field:nth-child(2){animation-delay:.6s}.field:nth-child(3){animation-delay:.7s}
.field label{display:block;font-size:.68rem;color:var(--muted);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:1px;font-family:'JetBrains Mono',monospace;}
.iw{position:relative;}
.iw input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:11px;padding:12px 14px 12px 42px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:.88rem;outline:none;transition:all .3s;}
.iw input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(97,87,255,.1);}
.iw input::placeholder{color:var(--muted);font-size:.82rem;}
.ii{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:.95rem;pointer-events:none;}

.sbtn2{width:100%;background:linear-gradient(135deg,var(--accent),#8b84ff);border:none;color:white;padding:13px;border-radius:11px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;margin-top:6px;transition:all .3s;box-shadow:0 4px 20px rgba(97,87,255,.3);position:relative;overflow:hidden;animation:fU .6s .8s both;}
.sbtn2::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(255,255,255,.1));transform:translateX(-100%);transition:transform .4s;}
.sbtn2:hover::before{transform:translateX(100%);}
.sbtn2:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(97,87,255,.5);}

.aerr{color:var(--a2);font-size:.76rem;text-align:center;margin-top:8px;display:none;font-family:'JetBrains Mono',monospace;animation:shake .4s ease;}
.div{display:flex;align-items:center;gap:10px;margin:18px 0;animation:fU .6s .75s both;}
.dl{flex:1;height:1px;background:var(--border);}
.dt{font-size:.68rem;color:var(--muted);white-space:nowrap;font-family:'JetBrains Mono',monospace;}
.tgnote{background:rgba(0,229,255,.05);border:1px solid rgba(0,229,255,.13);border-radius:9px;padding:11px 13px;font-size:.74rem;color:var(--a3);text-align:center;font-family:'JetBrains Mono',monospace;animation:fU .6s .9s both;}

/* ── MAIN APP ── */
#mainApp{display:none;}
nav{position:sticky;top:0;z-index:100;background:rgba(5,5,8,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;}
.nlogo{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:3px;background:linear-gradient(135deg,var(--accent),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nr{display:flex;align-items:center;gap:7px;}
.nchip{background:var(--s2);border:1px solid var(--border);border-radius:18px;padding:4px 11px;font-size:.72rem;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.nchip span{color:var(--accent);}
.nbtn{background:var(--s2);border:1px solid var(--border);color:var(--muted);padding:5px 11px;border-radius:8px;cursor:pointer;font-size:.72rem;font-family:'Space Grotesk',sans-serif;font-weight:600;transition:all .2s;}
.nbtn:hover{border-color:var(--accent);color:var(--accent);}
.nbtn.r:hover{border-color:var(--a2);color:var(--a2);}
.apill{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);color:#fbbf24;padding:3px 7px;border-radius:5px;font-size:.62rem;font-family:'JetBrains Mono',monospace;font-weight:700;}

.aw{max-width:1020px;margin:0 auto;padding:28px 22px 80px;}
.ph{margin-bottom:24px;}
.ph h2{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:2px;line-height:1;}
.ph h2 span{background:linear-gradient(135deg,var(--accent),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.ph p{color:var(--muted);font-size:.82rem;margin-top:3px;}

.bc{display:flex;align-items:center;gap:5px;margin-bottom:16px;font-size:.76rem;font-family:'JetBrains Mono',monospace;}
.bci{color:var(--muted);cursor:pointer;transition:color .2s;}
.bci:hover{color:var(--accent);}
.bci.act{color:var(--text);cursor:default;}
.bcs{color:var(--border);}

.uz{border:2px dashed var(--border);border-radius:18px;padding:28px 22px;text-align:center;cursor:pointer;transition:all .3s;background:var(--s1);margin-bottom:20px;position:relative;overflow:hidden;}
.uz::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,rgba(97,87,255,.06),transparent 70%);opacity:0;transition:opacity .3s;}
.uz:hover,.uz.drag{border-color:var(--accent);}
.uz:hover::before,.uz.drag::before{opacity:1;}
.ui{width:48px;height:48px;background:linear-gradient(135deg,var(--accent),var(--a2));border-radius:13px;display:flex;align-items:center;justify-content:center;margin:0 auto 11px;font-size:1.3rem;box-shadow:0 5px 20px rgba(97,87,255,.3);}
.uz h3{font-size:.95rem;font-weight:700;margin-bottom:4px;}
.uz p{color:var(--muted);font-size:.78rem;margin-bottom:14px;}
.ub{background:linear-gradient(135deg,var(--accent),#8b84ff);border:none;color:white;padding:9px 22px;border-radius:9px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.82rem;cursor:pointer;transition:all .2s;}
.ub:hover{transform:translateY(-2px);}
#fi{display:none;}
.pw{display:none;margin-top:10px;background:var(--s2);border-radius:5px;height:4px;overflow:hidden;}
.pf{height:100%;background:linear-gradient(90deg,var(--accent),var(--a2));width:0%;transition:width .3s;}
.pl{display:none;margin-top:5px;font-size:.72rem;color:var(--accent);font-family:'JetBrains Mono',monospace;}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.sc{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center;transition:border-color .2s;}
.sc:hover{border-color:var(--accent);}
.sc .n{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:1px;background:linear-gradient(135deg,var(--accent),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sc .l{font-size:.67rem;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;}

.tb{display:flex;gap:7px;margin-bottom:13px;flex-wrap:wrap;align-items:center;}
.sb{flex:1;min-width:130px;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:8px 13px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:.83rem;outline:none;transition:border-color .2s;}
.sb:focus{border-color:var(--accent);}
.sb::placeholder{color:var(--muted);}
.tbtn{background:var(--s2);border:1px solid var(--border);color:var(--muted);padding:7px 12px;border-radius:8px;font-size:.71rem;cursor:pointer;transition:all .2s;font-family:'Space Grotesk',sans-serif;font-weight:600;white-space:nowrap;}
.tbtn:hover,.tbtn.act{background:rgba(97,87,255,.1);border-color:var(--accent);color:var(--accent);}
.tbtn.g:hover,.tbtn.g.act{background:rgba(57,255,133,.07);border-color:var(--green);color:var(--green);}

.sl{font-family:'JetBrains Mono',monospace;font-size:.67rem;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:9px;margin-top:2px;}

.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(136px,1fr));gap:9px;margin-bottom:18px;}
.fcd2{background:var(--s1);border:1px solid var(--border);border-radius:13px;padding:13px;cursor:pointer;transition:all .25s;position:relative;display:flex;align-items:center;gap:9px;}
.fcd2:hover{border-color:#fbbf24;transform:translateY(-2px);box-shadow:0 7px 20px rgba(251,191,36,.08);}
.ffi{font-size:1.3rem;}
.ffn{font-family:'Space Grotesk',sans-serif;font-size:.75rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.ffa{position:absolute;top:5px;right:5px;display:flex;gap:3px;opacity:0;transition:opacity .2s;}
.fcd2:hover .ffa{opacity:1;}
.ffact{width:20px;height:20px;border-radius:5px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.58rem;}
.ffe{background:rgba(97,87,255,.8);color:white;}
.ffd{background:rgba(255,77,141,.8);color:white;}

.mg{display:grid;grid-template-columns:repeat(auto-fill,minmax(144px,1fr));gap:11px;}
.mc{background:var(--s1);border:1px solid var(--border);border-radius:13px;overflow:hidden;transition:all .25s;position:relative;}
.mc:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 9px 24px rgba(97,87,255,.13);}
.mp{width:100%;height:104px;display:flex;align-items:center;justify-content:center;font-size:1.9rem;background:linear-gradient(135deg,var(--s2),var(--bg));}
.mi{padding:8px 9px;}
.mn{font-family:'Space Grotesk',sans-serif;font-size:.71rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.mm{font-size:.62rem;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.ma{position:absolute;top:5px;right:5px;display:flex;gap:2px;opacity:0;transition:opacity .2s;flex-wrap:wrap;max-width:82px;}
.mc:hover .ma{opacity:1;}
.ab{width:22px;height:22px;border-radius:5px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.65rem;transition:transform .2s;}
.ab:hover{transform:scale(1.1);}
.ad{background:rgba(57,255,133,.85);color:#050508;}
.as{background:rgba(97,87,255,.85);color:white;}
.ar{background:rgba(251,191,36,.85);color:#050508;}
.am{background:rgba(0,229,255,.85);color:#050508;}
.ax{background:rgba(255,77,141,.85);color:white;}

.empty{text-align:center;padding:44px;color:var(--muted);grid-column:1/-1;}
.empty .ei{font-size:2.3rem;margin-bottom:8px;}
.empty p{font-size:.8rem;font-family:'JetBrains Mono',monospace;}

.mo{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(10px);z-index:300;display:none;align-items:center;justify-content:center;padding:20px;}
.mo.open{display:flex;}
.mb{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:26px;width:100%;max-width:380px;animation:popIn .3s ease;}
.mb h3{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:1px;margin-bottom:14px;}
.mb input,.mb select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:10px 12px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:.85rem;outline:none;margin-bottom:11px;transition:border-color .2s;}
.mb input:focus,.mb select:focus{border-color:var(--accent);}
.mbtns{display:flex;gap:7px;}
.mbtn{flex:1;padding:10px;border-radius:9px;border:none;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.82rem;transition:all .2s;}
.mbtn.p{background:linear-gradient(135deg,var(--accent),#8b84ff);color:white;}
.mbtn.s{background:var(--s2);border:1px solid var(--border);color:var(--muted);}
.sbox{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:9px 12px;font-size:.72rem;color:var(--a3);word-break:break-all;margin-bottom:11px;font-family:'JetBrains Mono',monospace;line-height:1.6;}

.as2{margin-bottom:26px;}
.as2 h3{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:1px;margin-bottom:11px;color:#fbbf24;}
.at{width:100%;border-collapse:collapse;}
.at th,.at td{padding:9px 11px;text-align:left;border-bottom:1px solid var(--border);font-size:.77rem;}
.at th{font-family:'JetBrains Mono',monospace;font-size:.64rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.db2{background:rgba(255,77,141,.1);border:1px solid rgba(255,77,141,.23);color:var(--a2);padding:3px 8px;border-radius:5px;cursor:pointer;font-size:.67rem;font-family:'Space Grotesk',sans-serif;transition:all .2s;}
.db2:hover{background:rgba(255,77,141,.22);}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:9px 16px;font-size:.77rem;font-family:'JetBrains Mono',monospace;z-index:999;transition:transform .3s;white-space:nowrap;box-shadow:0 5px 20px rgba(0,0,0,.5);}
.toast.show{transform:translateX(-50%) translateY(0);}

/* PREVIEW MODAL */
.prev-mo{position:fixed;inset:0;background:rgba(0,0,0,.92);backdrop-filter:blur(16px);z-index:400;display:none;align-items:center;justify-content:center;flex-direction:column;padding:20px;}
.prev-mo.open{display:flex;}
.prev-header{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:900px;margin-bottom:14px;}
.prev-name{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:1px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60%;}
.prev-actions{display:flex;gap:8px;}
.prev-btn{background:var(--s2);border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:9px;cursor:pointer;font-size:.76rem;font-family:'Space Grotesk',sans-serif;font-weight:600;transition:all .2s;}
.prev-btn:hover{border-color:var(--accent);color:var(--accent);}
.prev-btn.dl{background:rgba(57,255,133,.1);border-color:rgba(57,255,133,.3);color:var(--green);}
.prev-btn.cl{background:rgba(255,77,141,.1);border-color:rgba(255,77,141,.3);color:var(--a2);}
.prev-body{width:100%;max-width:900px;display:flex;align-items:center;justify-content:center;flex:1;max-height:80vh;}
.prev-body img{max-width:100%;max-height:80vh;border-radius:14px;object-fit:contain;animation:popIn .3s ease;}
.prev-body video{max-width:100%;max-height:80vh;border-radius:14px;outline:none;}
.prev-body audio{width:100%;max-width:500px;}
.prev-body iframe{width:100%;height:75vh;border-radius:14px;border:1px solid var(--border);}
.prev-body .prev-doc{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:48px;text-align:center;width:100%;}
.prev-doc .pd-icon{font-size:4rem;margin-bottom:16px;}
.prev-doc .pd-name{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:1px;margin-bottom:8px;}
.prev-doc .pd-info{color:var(--muted);font-size:.82rem;font-family:'JetBrains Mono',monospace;margin-bottom:24px;}
.prev-doc .pd-dl{background:linear-gradient(135deg,var(--accent),#8b84ff);border:none;color:white;padding:12px 28px;border-radius:11px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:all .2s;}
