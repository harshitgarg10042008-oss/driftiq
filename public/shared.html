<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DriftIQ — Shared File</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#08080f;color:#eeeeff;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.box{background:#0f0f1a;border:1px solid #2a2a42;border-radius:28px;padding:48px 40px;text-align:center;max-width:420px;width:100%;}
.logo{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,#7c6bff,#ff6b9d);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:32px;}
.icon{font-size:3.5rem;margin-bottom:16px;}
.filename{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:6px;word-break:break-all;}
.sub{color:#6b6b8f;font-size:0.85rem;margin-bottom:28px;}
.dl-btn{background:linear-gradient(135deg,#7c6bff,#9b8fff);border:none;color:white;padding:14px 32px;border-radius:13px;font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 24px rgba(124,107,255,0.35);text-decoration:none;display:inline-block;}
.dl-btn:hover{transform:translateY(-2px);}
.error{color:#ff6b9d;margin-top:16px;font-size:0.85rem;}
</style>
</head>
<body>
<div class="box">
  <div class="logo">DriftIQ</div>
  <div class="icon" id="icon">📁</div>
  <div class="filename" id="filename">Loading...</div>
  <div class="sub">Shared file — click to download</div>
  <a class="dl-btn" id="dlBtn" href="#" style="display:none">⬇️ Download File</a>
  <div class="error" id="err" style="display:none">❌ File not found or link expired</div>
</div>
<script>
const id = new URLSearchParams(window.location.search).get('id');
if (!id) { document.getElementById('err').style.display = 'block'; }
else {
  fetch(`/api/shared/${id}`).then(r => r.json()).then(d => {
    if (d.error) { document.getElementById('err').style.display = 'block'; return; }
    document.getElementById('filename').textContent = d.fileName;
    const btn = document.getElementById('dlBtn');
    btn.href = d.url;
    btn.download = d.fileName;
    btn.style.display = 'inline-block';
    const ext = d.fileName.split('.').pop().toLowerCase();
    const icon = ['jpg','jpeg','png','gif','webp'].includes(ext) ? '🖼️' :
                 ['mp4','mov','avi'].includes(ext) ? '🎬' :
                 ['mp3','wav'].includes(ext) ? '🎵' :
                 ext === 'pdf' ? '📄' : '📁';
    document.getElementById('icon').textContent = icon;
  }).catch(() => document.getElementById('err').style.display = 'block');
}
</script>
</body>
</html>
