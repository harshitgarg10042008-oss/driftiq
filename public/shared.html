<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DriftIQ — Shared Resource</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <!-- Stylesheets -->
    <link rel="stylesheet" href="/assets/css/main.css" />
    <link rel="stylesheet" href="/assets/css/animations.css" />
    <style>
      body {
        background: var(--bg-base);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--sp-4);
        overflow: hidden;
      }
      #bgCanvas {
        position: fixed;
        inset: 0;
        z-index: -2;
        pointer-events: none;
      }
      .shared-box {
        width: 100%;
        max-width: 420px;
        text-align: center;
        background: rgba(15, 15, 20, 0.7);
        border: 1px solid var(--border-color);
        border-radius: var(--r-xl);
        padding: var(--sp-8) var(--sp-6);
        backdrop-filter: blur(20px);
        box-shadow: var(--shadow-xl);
        animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .brand-logo {
        font-weight: 700;
        font-size: 24px;
        letter-spacing: -0.02em;
        margin-bottom: var(--sp-6);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: var(--sp-2);
      }
      .file-icon {
        font-size: 64px;
        margin-bottom: var(--sp-4);
      }
      .filename {
        font-weight: 600;
        font-size: 18px;
        color: var(--text-primary);
        word-break: break-all;
        margin-bottom: var(--sp-1);
      }
      .meta-info {
        font-family: var(--font-mono);
        font-size: 13px;
        color: var(--text-secondary);
        margin-bottom: var(--sp-6);
      }
      .input-password-wrapper {
        margin-bottom: var(--sp-6);
        text-align: left;
      }
    </style>
  </head>
  <body>
    <canvas id="bgCanvas"></canvas>

    <div class="shared-box">
      <div class="brand-logo">
        <span style="font-size: 28px;">☁️</span> DriftIQ
      </div>

      <!-- Loading State -->
      <div id="loading-state" class="animate-pulse">
        <div class="file-icon">⏳</div>
        <p class="text-secondary font-medium">Resolving decentralized storage node...</p>
      </div>

      <!-- Mapped Resource Container -->
      <div id="resource-container" class="hidden animate-fade-in">
        <div class="file-icon" id="res-icon">📄</div>
        <p class="filename" id="res-name">filename.ext</p>
        <p class="meta-info" id="res-meta">0 B</p>

        <!-- Password Lock Entry -->
        <div class="input-password-wrapper hidden p-md" id="password-wrapper" style="background: rgba(248,81,73,0.05); border: 1px solid var(--red-dim); border-radius: var(--r-md);">
          <p class="text-red mb-sm font-medium flex items-center justify-center gap-sm" style="font-size: 13px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            Secure Share Tunnel
          </p>
          <input type="password" id="share-password" placeholder="Enter Decryption Password" class="w-100" />
        </div>

        <button class="btn btn-primary btn-lg w-100" id="dl-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          Download Node
        </button>
      </div>

      <!-- Error State -->
      <div id="error-state" class="hidden animate-slide-in">
        <div class="file-icon text-red">❌</div>
        <h3 class="text-red mb-sm">Access Denied</h3>
        <p class="text-secondary mb-lg" id="error-message">This share tunnel is inactive, expired, or invalid.</p>
        <a href="/" class="btn btn-secondary w-100">Return to Authentication</a>
      </div>
    </div>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/notifications.js"></script>
    <script>
      // Enhanced Canvas Background Particles
      const canvas = document.getElementById("bgCanvas");
      const ctx = canvas.getContext("2d");
      let particles = [];
      
      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();

      class Particle {
        constructor() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.vx = (Math.random() - 0.5) * 0.5;
          this.vy = (Math.random() - 0.5) * 0.5;
          this.size = Math.random() * 2 + 1;
          this.color = Math.random() > 0.5 ? "rgba(0, 245, 212, 0.2)" : "rgba(16, 185, 129, 0.15)";
        }
        draw() {
          ctx.fillStyle = this.color;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fill();
        }
        update() {
          this.x += this.vx;
          this.y += this.vy;
          if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
          if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
        }
      }

      for (let i = 0; i < 40; i++) particles.push(new Particle());

      function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        
        for (let a = 0; a < particles.length; a++) {
          for (let b = a; b < particles.length; b++) {
            let dist = (particles[a].x - particles[b].x) ** 2 + (particles[a].y - particles[b].y) ** 2;
            if (dist < 10000) {
              let alpha = (1 - dist / 10000) * 0.2;
              ctx.strokeStyle = `rgba(0, 245, 212, ${alpha})`;
              ctx.lineWidth = 0.5;
              ctx.beginPath();
              ctx.moveTo(particles[a].x, particles[a].y);
              ctx.lineTo(particles[b].x, particles[b].y);
              ctx.stroke();
            }
          }
        }
        requestAnimationFrame(animateParticles);
      }
      animateParticles();

      // Parse URL share token
      const queryParams = new URLSearchParams(window.location.search);
      const token = queryParams.get("token") || queryParams.get("id");
      let needsPassword = false;

      window.addEventListener("DOMContentLoaded", async () => {
        if (!token) {
          showError("Invalid Share link token mapping.");
          return;
        }
        resolveShareDetails();
      });

      async function resolveShareDetails(password = null) {
        document.getElementById("loading-state").classList.remove("hidden");
        document.getElementById("resource-container").classList.add("hidden");
        document.getElementById("error-state").classList.add("hidden");

        try {
          const res = await api.getSharedFile(token, password);
          const f = res.data;

          document.getElementById("loading-state").classList.add("hidden");
          document.getElementById("resource-container").classList.remove("hidden");

          document.getElementById("res-name").textContent = f.file_name || f.name;
          document.getElementById("res-meta").textContent = formatBytes(f.size || 0);

          const ext = (f.file_name || f.name || "").split(".").pop().toLowerCase();
          let icon = "📁";
          if (["png", "jpg", "jpeg", "gif", "webp"].includes(ext)) icon = "🖼️";
          else if (["mp4", "webm", "mkv", "avi"].includes(ext)) icon = "🎬";
          else if (["mp3", "wav", "aac"].includes(ext)) icon = "🎵";
          else if (["zip", "rar", "7z"].includes(ext)) icon = "🗜️";
          else if (ext === "pdf") icon = "📄";
          document.getElementById("res-icon").textContent = icon;

          if (password) {
            needsPassword = false;
            document.getElementById("password-wrapper").classList.add("hidden");
          }
        } catch (err) {
          document.getElementById("loading-state").classList.add("hidden");
          if (err.status === 401) {
            needsPassword = true;
            document.getElementById("resource-container").classList.remove("hidden");
            document.getElementById("password-wrapper").classList.remove("hidden");
            if (password) notify.error("Incorrect decryption password lock.");
          } else {
            showError(err.data?.error || "This resource link has expired or has been revoked.");
          }
        }
      }

      async function startDownload() {
        const pass = document.getElementById("share-password").value;
        if (needsPassword && !pass) {
          notify.warning("Password lock verification required.");
          return;
        }

        const btn = document.getElementById("dl-btn");
        btn.disabled = true;
        btn.innerHTML = "⏳ Extracting Node Payload...";

        try {
          if (needsPassword) await api.getSharedFile(token, pass);
          
          notify.info("Downloading file from secure Telegram storage bot...");
          await api.downloadSharedFile(token, pass);

          btn.innerHTML = "✅ Complete!";
          notify.success("File download sync complete!");
          setTimeout(() => {
            btn.disabled = false;
            btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg> Download Node`;
          }, 3000);
        } catch (err) {
          btn.disabled = false;
          btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg> Download Node`;
          notify.error("Payload download transmission interrupted.");
        }
      }

      document.getElementById("dl-btn")?.addEventListener("click", startDownload);

      function showError(msg) {
        document.getElementById("loading-state").classList.add("hidden");
        document.getElementById("resource-container").classList.add("hidden");
        document.getElementById("error-state").classList.remove("hidden");
        document.getElementById("error-message").textContent = msg;
      }

      function formatBytes(bytes, decimals = 2) {
        if (bytes === 0) return "0 B";
        const k = 1024;
        const dm = decimals < 0 ? 0 : decimals;
        const sizes = ["B", "KB", "MB", "GB", "TB"];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + " " + sizes[i];
      }
    </script>
  </body>
</html>
