services:
  # Backend API Service
  - type: web
    name: driftiq-backend
    env: node
    buildCommand: npm install
    startCommand: npm run start:prod:backend
    envVars:
      - key: PORT
        value: 4000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false

  # Frontend Static Site
  - type: web
    name: driftiq-frontend
    env: static
    buildCommand: npm install
    staticPublishPath: apps/frontend/dist
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: driftiq-backend
          envVarKey: RENDER_EXTERNAL_URL
