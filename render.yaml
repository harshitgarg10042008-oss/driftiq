services:
  - type: web
    name: driftiq-backend
    env: node
    buildCommand: npm install && cd apps/backend && npm run build
    startCommand: cd apps/backend && npm run start:prod
    envVars:
      - key: PORT
        value: 4000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
